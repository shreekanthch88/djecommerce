{% extends "base.html" %}

{% block content %}
<main>
  <div class="container">
    <div class="card my-4">
      <div class="card-body">
        <h4 class="mb-3">Delete Address</h4>
        <p>Are you sure you want to delete this address?</p>
        <p><strong>{{ address.full_name }}</strong> — {{ address.house_no }}, {{ address.street_area }}, {{ address.city }}</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Delete</button>
          <a class="btn btn-outline-secondary" href="{% url 'core:account' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
