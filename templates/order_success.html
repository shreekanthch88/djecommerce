{% extends "base.html" %}

{% block content %}
<main>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card my-5 p-4 text-center">
          <h2 class="mb-3">Order Placed</h2>
          <p class="text-muted mb-4">Your order has been placed successfully.</p>

          {% if order %}
          <div class="mb-4">
            <div><strong>Order Ref:</strong> {{ order.ref_code }}</div>
            <div><strong>Total:</strong> ₹{{ order.get_total }}</div>
          </div>
          {% endif %}

          <a href="/" class="btn btn-primary btn-lg">Continue Shopping</a>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
