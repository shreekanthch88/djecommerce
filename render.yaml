services:
  - type: web
    name: django-ecommerce-app
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn djecommerce.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: ALLOWED_HOSTS
        value: "django-ecommerce-app.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://django-ecommerce-app.onrender.com"

databases:
  - name: ecommerce-db
    plan: free
